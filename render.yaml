services:
  - type: web
    name: finbridge-api
    runtime: node
    buildCommand: pnpm install && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finbridge-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: finbridge-db
    databaseName: finbridge
    plan: free
